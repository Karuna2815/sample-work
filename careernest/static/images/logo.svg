<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2E73"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <!-- Letter C - Navy -->
  <path d="M 28.5 12 A 15 15 0 1 0 28.5 38" stroke="#0A2E73" stroke-width="7" stroke-linecap="round"/>

  <!-- Briefcase inside C -->
  <rect x="14" y="21" width="10" height="8" rx="1.5" fill="#1E88E5"/>
  <rect x="17" y="19" width="4" height="2.5" rx="1" fill="#1E88E5"/>
  <line x1="19" y1="19" x2="19" y2="16.5" stroke="#1E88E5" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Letter N - Bright Blue -->
  <path d="M 30 10 L 30 40 L 44 12 L 44 40" stroke="#1E88E5" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Graduation Cap above N -->
  <path d="M 30 6 L 38 2 L 46 6 L 38 10 Z" fill="#0A2E73"/>
  <line x1="38" y1="10" x2="38" y2="13.5" stroke="#0A2E73" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="38" cy="14.5" r="1.2" fill="#0A2E73"/>
  <line x1="31" y1="7" x2="38" y2="5" stroke="#1E88E5" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Swoosh (career journey curve) -->
  <path d="M 18 42 C 24 48 36 46 46 42" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- CareerNest Text -->
  <text x="65" y="24" font-family="'Inter', 'Segoe UI', 'Poppins', Arial, sans-serif" font-weight="700" font-size="21" letter-spacing="-0.5">
    <tspan fill="#0A2E73">Career</tspan><tspan fill="#1E88E5">Nest</tspan>
  </text>

  <!-- Tagline -->
  <text x="65" y="37" font-family="'Inter', 'Segoe UI', 'Poppins', Arial, sans-serif" font-weight="600" font-size="6.5" fill="#6B7280" letter-spacing="2">CONNECT  •  LEARN  •  GROW</text>
  <text x="65" y="45" font-family="'Inter', 'Segoe UI', 'Poppins', Arial, sans-serif" font-weight="600" font-size="5.5" fill="#0A2E73" letter-spacing="1.2">OJT &amp; INTERNSHIP PORTAL</text>
</svg>
