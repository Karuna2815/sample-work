{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Post a New Internship</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Python Django Developer Intern" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="e.g. Kathmandu" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Type</label>
                            <select name="internship_type" class="form-select">
                                <option value="onsite">On-site</option>
                                <option value="remote">Remote</option>
                                <option value="hybrid">Hybrid</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Duration</label>
                            <input type="text" name="duration" class="form-control" placeholder="e.g. 3 months">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Stipend</label>
                            <input type="text" name="stipend" class="form-control" placeholder="e.g. Rs. 10,000/month">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Skills Required</label>
                            <input type="text" name="skills_required" class="form-control" placeholder="e.g. Python, Django, React">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="6" placeholder="Describe the internship role, responsibilities, and requirements..." required></textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4 rounded-pill">
                            <i class="bi bi-send"></i> Post Internship
                        </button>
                        <a href="{% url 'company_dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
