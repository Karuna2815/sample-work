{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center" style="border-top: 4px solid var(--primary);">
                <div class="mb-3">
                    <div class="icon-circle mx-auto" style="background: #EFF6FF; color: var(--primary); width: 56px; height: 56px; font-size: 1.5rem;"><i class="bi bi-lock"></i></div>
                </div>
                <h4 class="fw-bold mb-1">Set New Password</h4>
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Choose a strong new password.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password1" class="form-control" placeholder="New password" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="new_password2" class="form-control" placeholder="Confirm password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
