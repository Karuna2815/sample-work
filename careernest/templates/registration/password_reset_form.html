{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center" style="border-top: 4px solid var(--primary);">
                <div class="mb-3">
                    <div class="icon-circle mx-auto" style="background: #EFF6FF; color: var(--primary); width: 56px; height: 56px; font-size: 1.5rem;"><i class="bi bi-envelope"></i></div>
                </div>
                <h4 class="fw-bold mb-1">Reset Password</h4>
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Enter your email and we'll send you a reset link.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Your email address" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
                </form>
                <div class="mt-3">
                    <a href="{% url 'login' %}" class="small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
