{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-key"></i> Reset Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-3">Enter your email and we'll send instructions to reset your password.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
                </form>
                <p class="text-center mt-3 mb-0"><a href="{% url 'login' %}">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
