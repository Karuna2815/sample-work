{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4" style="border-top: 4px solid var(--primary);">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="icon-circle" style="background: #EFF6FF; color: var(--primary); width: 48px; height: 48px;"><i class="bi bi-gear"></i></div>
                    <div>
                        <h4 class="fw-bold mb-0">Edit Profile</h4>
                        <p class="text-muted mb-0" style="font-size: 0.9rem;">Update your personal information.</p>
                    </div>
                </div>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Education</label>
                            <input type="text" name="education" class="form-control" placeholder="Your education" value="{{ form.education.value|default:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Skills</label>
                            <input type="text" name="skills" class="form-control" placeholder="e.g. Python, Django" value="{{ form.skills.value|default:'' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Bio</label>
                            <textarea name="bio" class="form-control" rows="3" placeholder="Tell us about yourself" style="height: auto;">{{ form.bio.value|default:'' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Resume (PDF)</label>
                            <input type="file" name="resume" class="form-control" accept=".pdf">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                        <a href="{% url 'profile' %}" class="btn btn-ghost px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
