{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center" style="border-top: 4px solid var(--primary);">
                <div class="mb-3">
                    <div class="icon-circle mx-auto" style="background: #EFF6FF; color: var(--primary); width: 56px; height: 56px; font-size: 1.5rem;"><i class="bi bi-box-arrow-in-right"></i></div>
                </div>
                <h4 class="fw-bold mb-1">Welcome Back</h4>
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Sign in to your account.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <div class="d-flex justify-content-end mb-3">
                        <a href="{% url 'password_reset' %}" class="small">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-1 small">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
                    <p class="mb-0 small">Are you a company? <a href="{% url 'company_register' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
