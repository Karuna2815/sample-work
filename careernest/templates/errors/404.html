{% extends 'base.html' %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 pt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 fw-bold text-primary" style="font-size: 6rem;">404</div>
        <i class="bi bi-emoji-frown display-1 text-muted"></i>
        <h4 class="fw-bold mt-3">Oops! Page Not Found</h4>
        <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn btn-primary btn-lg px-5 rounded-pill mt-2"><i class="bi bi-house"></i> Go Home</a>
    </div>
</div>
{% endblock %}
